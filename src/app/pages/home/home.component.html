<void-header></void-header>

<main>
	<div class="first-row">
		<mat-card>
			<div class="info-col">
				<div class="info-row">
					<label>Sistema:</label>
					<span>DVS-123</span>
				</div>
				<div class="info-row">
					<label>Tipo de estrella:</label>
					<span>
						V-A
						<button mat-icon-button color="primary" aria-label="Ver en la Wikipedia">
							<mat-icon>info</mat-icon>
						</button>
					</span>
				</div>
				<div class="info-row">
					<label>Num. planetas:</label>
					<span>3</span>
				</div>
			</div>
			<div class="info-col">
				<div class="info-row">
					<label>Créditos:</label>
					<span>5.000</span>
				</div>
				<div class="info-row">
					<label>Integridad nave:</label>
					<span>100%</span>
				</div>
			</div>
		</mat-card>
		<mat-card>
			<div class="message-list">
				<mat-nav-list>
					<a mat-list-item href="#" *ngFor="let message of messageList">
						<mat-icon mat-list-icon *ngIf="message.type==1">email</mat-icon>
						<mat-icon mat-list-icon *ngIf="message.type==2">monetization_on</mat-icon>
						<h4 mat-line>{{ message.name }} <span class="message-date">{{message.date}}</span></h4>
						<p mat-line> {{ message.message }}</p>
					</a>
				</mat-nav-list>
			</div>
		</mat-card>
	</div>
	<div class="second-row">
		<mat-card></mat-card>
	</div>
</main>
